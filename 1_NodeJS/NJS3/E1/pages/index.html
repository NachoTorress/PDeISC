<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DHTML con Express</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Laboratorio DHTML</h2>
        <div class="card shadow-sm mb-4">
            <div class="card-body d-flex flex-wrap gap-2 justify-content-center">
                <button id="btnCrear" class="btn btn-primary">Agregar H1</button>
                <button id="btnCambiarTexto" class="btn btn-secondary">Cambiar Texto</button>
                <button id="btnColor" class="btn btn-info text-white">Cambiar Color</button>
                <button id="btnImg" class="btn btn-success">Agregar Imagen</button>
                <button id="btnCambiarImg" class="btn btn-warning">Cambiar Imagen</button>
                <button id="btnSize" class="btn btn-danger">Cambiar Tamaño</button>
            </div>
        </div>
        <div id="contenedor" class="text-center mt-5 p-4 border border-dashed rounded bg-white" style="min-height: 200px;">
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
