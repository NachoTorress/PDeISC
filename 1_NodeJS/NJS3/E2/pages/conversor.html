<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Conversor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/conversor.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div>
    <main class="container py-4">
        <div class="card shadow mx-auto col-md-6 col-lg-5 p-4 border-info border-top border-4">
            <h3 class="text-center mb-4">🔄 Conversor de Medidas</h3>
            
            <div class="mb-3">
                <label class="form-label">Kilómetros:</label>
                <input type="number" id="kmInput" class="form-control" placeholder="0">
            </div>
            <div class="text-center mb-3">⬇️ equivale a ⬇️</div>
            <div class="mb-3">
                <label class="form-label">Millas:</label>
                <input type="number" id="miInput" class="form-control" placeholder="0">
            </div>
            <small class="text-muted d-block text-center mt-3">* Escribe en cualquier caja para convertir</small>
        </div>
    </main>
    <script type="module">import { renderNavbar } from '/modules/navbar.js'; renderNavbar();</script>
    <script type="module" src="/scripts/conversor.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
