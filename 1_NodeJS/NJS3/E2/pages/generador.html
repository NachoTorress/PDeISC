<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/generador.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div>
    <main class="container py-4">
        <div class="card shadow mx-auto col-md-6 col-lg-5 p-4 border-success border-top border-4">
            <h3 class="text-center mb-4">🔐 Generador Seguro</h3>
            <div class="input-group mb-3">
                <input type="text" id="passResult" class="form-control text-center fs-4 font-monospace" readonly placeholder="Presiona Generar">
                <button class="btn btn-outline-secondary" id="btnCopiar">Copiar</button>
            </div>
            <button id="btnGenerar" class="btn btn-success w-100">Generar Contraseña</button>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">import { renderNavbar } from '/modules/navbar.js'; renderNavbar();</script>
    <script type="module" src="/scripts/generador.js"></script>
</body>
</html>
