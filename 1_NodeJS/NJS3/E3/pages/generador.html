<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Generador</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/generador.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="container py-4">
        <div class="card shadow mx-auto col-md-6 col-lg-5 p-4 border-success border-top border-4">
            
            <!-- GENERADOR -->
            <h3 class="text-center mb-4">🔐 Generador Seguro</h3>

            <div class="input-group mb-3">
                <input type="text" id="passResult" class="form-control text-center fs-4 font-monospace" readonly placeholder="Presiona Generar">
                <button class="btn btn-outline-secondary" id="btnCopiar">Copiar</button>
            </div>

            <button id="btnGenerar" class="btn btn-success w-100 mb-4">
                Generar Contraseña
            </button>

            <!-- ANALIZADOR DOM -->
            <div class="border-top pt-4">
                <p class="small text-secondary text-uppercase text-center mb-3">
                    Contador de Descendientes
                </p>

                <div class="bg-light p-3 rounded text-center">
                    <p class="small text-muted mb-3">
                        Haz clic en cualquier parte de la tarjeta para analizar un elemento
                    </p>

                    <button id="btnContarTodo" class="btn btn-info w-100 mb-3">
                        🔍 Analizar componente completo
                    </button>

                    <h5 class="mb-0">
                        Total nodos: 
                        <span id="conteoNodos" class="text-primary">0</span>
                    </h5>
                </div>
            </div>

        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { renderNavbar } from '/modules/navbar.js';
        renderNavbar();
    </script>
    <script type="module" src="/scripts/generador.js"></script>
</body>
</html>
