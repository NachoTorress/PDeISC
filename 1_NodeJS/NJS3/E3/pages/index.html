<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - MultiTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/index.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div> 
    
    <main class="container text-center py-5 fade-in">
        <h1 class="display-4 text-primary mb-4">Bienvenido al Hub</h1>
        <p class="lead text-muted mb-5">Selecciona una herramienta del menú para comenzar.</p>
        
        <div id="saludo-dinamico" class="alert alert-info d-inline-block mb-4">
            Cargando sistema...
        </div>

        <!-- ANALIZADOR DOM -->
        <div class="border-top pt-4 mt-4">
            <p class="small text-secondary text-uppercase text-center mb-3">
                Contador de Descendientes
            </p>

            <div class="bg-light p-3 rounded text-center d-inline-block">
                <p class="small text-muted mb-3">
                    Haz clic en cualquier parte de la página para analizar un elemento
                </p>

                <button id="btnContarTodo" class="btn btn-info w-100 mb-3">
                    🔍 Analizar página completa
                </button>

                <h5 class="mb-0">
                    Total nodos: 
                    <span id="conteoNodos" class="text-primary">0</span>
                </h5>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { renderNavbar } from '/modules/navbar.js';
        renderNavbar();
    </script>
    <script type="module" src="/scripts/index.js"></script>
</body>
</html>
