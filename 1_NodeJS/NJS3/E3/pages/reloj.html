<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronómetro Pro - MultiTool</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/reloj.css">
</head>
<body class="bg-light">

    <div id="navbar-container"></div>

    <main class="container py-4">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-8">
                
                <div id="raiz-componente" class="card bg-dark text-white shadow-lg border-0 rounded-4">
                    <div class="card-body p-3 p-sm-5">
                        <h4 class="text-center text-uppercase mb-4 fw-light tracking-wider">⏱️ Cronómetro de Precisión</h4>
                        
                        <div id="seccion-pantalla" class="chrono-wrapper mb-5">
                            <div class="time-block">
                                <span id="minutos">00</span>
                                <small>MIN</small>
                            </div>
                            <div class="time-sep">:</div>
                            <div class="time-block">
                                <span id="segundos">00</span>
                                <small>SEG</small>
                            </div>
                            <div class="time-sep">.</div>
                            <div class="time-block text-info">
                                <span id="milisegundos">000</span>
                                <small>MS</small>
                            </div>
                        </div>

                        <div id="seccion-controles" class="row g-2 mb-4">
                            <div class="col-4">
                                <button id="btnStart" class="btn btn-success w-100 py-3 fw-bold">INICIAR</button>
                            </div>
                            <div class="col-4">
                                <button id="btnStop" class="btn btn-danger w-100 py-3 fw-bold">PAUSAR</button>
                            </div>
                            <div class="col-4">
                                <button id="btnReset" class="btn btn-outline-warning w-100 py-3 fw-bold">RESET</button>
                            </div>
                        </div>

                        <div class="border-top border-secondary pt-4 mt-2">
                            <p class="small text-secondary text-uppercase text-center mb-3">Contador de Descendientes Totales</p>
                            
                            <div class="bg-black bg-opacity-25 p-3 rounded text-center">
                                <p class="small mb-3 text-muted">Haz clic para analizar la profundidad del árbol DOM</p>
                                
                                <div class="row g-2 mb-3">
                                    <div class="col-12">
                                        <button id="btnContarTodo" class="btn btn-info w-100 fw-bold">
                                            🔍 ANALIZAR DESCENDENCIA COMPLETA
                                        </button>
                                    </div>
                                </div>
                                
                                <div class="py-2">
                                    <h2 class="mb-0">Total: <span id="conteoTotal" class="text-info">0</span></h2>
                                    <small class="text-secondary italic">Etiquetas HTML encontradas en este componente</small>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        import { renderNavbar } from '/modules/navbar.js';
        renderNavbar();
    </script>
    <script type="module" src="/scripts/reloj.js"></script>
</body>
</html>
