<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Tareas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/tareas.css">
</head>
<body class="bg-light">
    <div id="navbar-container"></div>

    <main class="container py-4">
        <div class="card shadow mx-auto col-md-8 col-lg-6 p-4">

            <!-- LISTA DE TAREAS -->
            <h3 class="mb-4">📝 Mis Tareas</h3>

            <form id="formTarea" class="input-group mb-4">
                <input type="text" id="inputTarea" class="form-control" placeholder="Nueva tarea..." required>
                <button type="submit" class="btn btn-primary">Agregar</button>
            </form>

            <ul id="listaTareas" class="list-group mb-4"></ul>

            <!-- ANALIZADOR DOM -->
            <div class="border-top pt-4">
                <p class="small text-secondary text-uppercase text-center mb-3">
                    Contador de Descendientes
                </p>

                <div class="bg-light p-3 rounded text-center">
                    <p class="small text-muted mb-3">
                        Haz clic en cualquier parte de la tarjeta para analizar un elemento
                    </p>

                    <button id="btnContarTodo" class="btn btn-info w-100 mb-3">
                        🔍 Analizar componente completo
                    </button>

                    <h5 class="mb-0">
                        Total nodos: 
                        <span id="conteoNodos" class="text-primary">0</span>
                    </h5>
                </div>
            </div>

        </div>
    </main>

    <script type="module">
        import { renderNavbar } from '/modules/navbar.js';
        renderNavbar();
    </script>
    <script type="module" src="/scripts/tareas.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
