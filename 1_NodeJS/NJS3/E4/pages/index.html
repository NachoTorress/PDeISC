<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E4 - Editor de Nodos Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/reloj.css">
    <style>
        .fila-nodo { transition: all 0.3s ease; border-left: 4px solid #0d6efd; background-color: rgba(255,255,255,0.05); }
        .log-container { background: #121212; border: 1px solid #333; color: #00ff00; }
        .input-group-text { min-width: 80px; justify-content: center; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg border-0 bg-dark text-white p-4">
            <h3 class="text-center mb-4 fw-light">🛠️ Constructor de Nodos Dinámicos</h3>
            
            <div class="bg-black bg-opacity-25 p-4 rounded-4 mb-4 border border-secondary">
                <p class="small text-secondary text-uppercase mb-3">Configuración del nuevo nodo:</p>
                <div class="row g-3 align-items-end">
                    <div class="col-md-5">
                        <label class="form-label small text-info">Etiqueta visible:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary text-white border-secondary small">Texto</span>
                            <input type="text" id="inputNombre" class="form-control bg-dark text-white border-secondary" placeholder="Ej: Google">
                        </div>
                    </div>
                    <div class="col-md-5">
                        <label class="form-label small text-info">Dirección de destino:</label>
                        <div class="input-group">
                            <span class="input-group-text bg-secondary text-white border-secondary small">URL</span>
                            <input type="text" id="inputLink" class="form-control bg-dark text-white border-secondary" placeholder="https://google.com">
                        </div>
                    </div>
                    <div class="col-md-2">
                        <button id="btnAgregar" class="btn btn-primary w-100 fw-bold">CREAR <a></button>
                    </div>
                </div>
            </div>

            <div id="listaNodos" class="d-flex flex-column gap-3 mb-4">
                </div>

            <div id="consola" class="log-container p-3 rounded d-none">
                <div class="text-secondary small mb-2 border-bottom border-secondary pb-1 text-uppercase">Log de Atributos:</div>
                <div id="logContenido" class="font-monospace small" style="max-height: 120px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/script.js"></script>
</body>
</html>
