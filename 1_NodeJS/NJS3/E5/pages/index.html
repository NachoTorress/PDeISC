<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E4 - Punto 5: Inyección innerHTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/styles/reloj.css">
    <style>
        .canvas-objetos { 
            min-height: 400px; 
            border: 2px dashed #444; 
            background-color: rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .card-custom { max-width: 300px; margin: 10px; border: 1px solid #555; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="card shadow-lg border-0 bg-dark text-white p-4">
            <h3 class="text-center mb-4 fw-light">🖼️ Generador de Objetos vía innerHTML</h3>
            
            <div class="d-flex flex-wrap gap-2 justify-content-center mb-5 p-3 bg-black bg-opacity-25 rounded">
                <button id="btnCard" class="btn btn-outline-info">➕ Inyectar Tarjeta</button>
                <button id="btnAlerta" class="btn btn-outline-warning">➕ Inyectar Alerta</button>
                <button id="btnTabla" class="btn btn-outline-success">➕ Inyectar Tabla</button>
                <div class="vr mx-2 bg-secondary"></div>
                <button id="btnLimpiar" class="btn btn-danger">🗑️ Limpiar Todo</button>
            </div>

            <div id="canvas" class="canvas-objetos rounded-4 p-4 d-flex flex-wrap justify-content-center align-items-start">
                </div>

            <div class="mt-4 p-3 bg-secondary bg-opacity-10 rounded border border-secondary border-opacity-25">
                <p class="small text-secondary mb-0 italic">
                    <b>Nota técnica:</b> Cada objeto se agrega recuperando el <code>innerHTML</code> actual y concatenando 
                    un nuevo bloque de código mediante el operador <code>+=</code>.
                </p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/scripts/script.js"></script>
</body>
</html>
