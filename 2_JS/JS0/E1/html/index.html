<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/styles/style.css">

  <title>Push() en JavaScript</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método push() en JavaScript</h1>

  <div class="row g-4">

    <!-- Frutas -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Frutas</h3>
        <div id="frutas"></div>
        <button class="btn btn-success mt-3" onclick="agregarFruta()">
          Agregar fruta
        </button>
      </div>
    </div>

    <!-- Amigos -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Amigos</h3>
        <div id="amigos"></div>
        <button class="btn btn-primary mt-3" onclick="agregarAmigo()">
          Agregar amigo
        </button>
      </div>
    </div>

    <!-- Números -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>
        <button class="btn btn-warning mt-3" onclick="agregarNumero()">
          Generar número
        </button>
      </div>
    </div>

  </div>

  <!-- Resultado número generado -->
  <div class="text-center mt-4">
    <h4 id="resultadoNumero">Número generado: -</h4>
  </div>

</div>

<script src="/scripts/script.js"></script>
</body>
</html>
