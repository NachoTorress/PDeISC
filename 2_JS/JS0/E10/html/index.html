<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>map() range final</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">map() con range (ejecución única)</h1>

  <div class="row g-4">

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números x3</h3>
        <div id="numeros"></div>

        <p id="txtNum" class="mt-2">
          Cambiá el valor del rango para ejecutar la acción
        </p>

        <input id="rangeNum" type="range" min="1" max="10" value="1" class="form-range mt-2">

        <div id="resNumero" class="mt-3"></div>
      </div>
    </div>

    <!-- NOMBRES -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Mayúsculas</h3>
        <div id="nombres"></div>

        <p id="txtNom" class="mt-2">
          Cambiá el valor del rango para ejecutar la acción
        </p>

        <input id="rangeNombre" type="range" min="1" max="10" value="1" class="form-range mt-2">

        <div id="resNombre" class="mt-3"></div>
      </div>
    </div>

    <!-- PRECIOS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Precios + IVA</h3>
        <div id="precios"></div>

        <p id="txtPre" class="mt-2">
          Cambiá el valor del rango para ejecutar la acción
        </p>

        <input id="rangePrecio" type="range" min="1" max="10" value="1" class="form-range mt-2">

        <div id="resPrecio" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
