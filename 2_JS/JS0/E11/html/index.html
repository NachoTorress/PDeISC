<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>filter()</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método filter()</h1>

  <div class="row g-4">

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números > 10</h3>
        <div id="numeros"></div>

        <button id="btnNum" class="btn btn-primary mt-3">
          Filtrar números
        </button>

        <div id="resNum" class="mt-3"></div>
      </div>
    </div>

    <!-- PALABRAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Palabras > 5 letras</h3>
        <div id="palabras"></div>

        <button id="btnPal" class="btn btn-success mt-3">
          Filtrar palabras
        </button>

        <div id="resPal" class="mt-3"></div>
      </div>
    </div>

    <!-- USUARIOS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Usuarios activos</h3>
        <div id="usuarios"></div>

        <button id="btnUsu" class="btn btn-warning mt-3">
          Filtrar usuarios
        </button>

        <div id="resUsu" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
