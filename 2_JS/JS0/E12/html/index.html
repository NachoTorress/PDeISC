<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>reduce()</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-2">Método reduce()</h1>

  <p class="text-center text-muted mb-4">
    ⚠️ Para ejecutar cada acción tenés que hacer <strong>doble click</strong> en el botón
  </p>

  <div class="row g-4">

    <!-- SUMA -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Suma total</h3>
        <div id="suma"></div>

        <button id="btnSuma" class="btn btn-primary mt-3">
          Calcular suma
        </button>

        <div id="resSuma" class="mt-3"></div>
      </div>
    </div>

    <!-- MULTIPLICACION -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Multiplicación total</h3>
        <div id="mult"></div>

        <button id="btnMult" class="btn btn-success mt-3">
          Calcular producto
        </button>

        <div id="resMult" class="mt-3"></div>
      </div>
    </div>

    <!-- OBJETOS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Total precios</h3>
        <div id="precios"></div>

        <button id="btnPrecios" class="btn btn-warning mt-3">
          Calcular total
        </button>

        <div id="resPrecios" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
