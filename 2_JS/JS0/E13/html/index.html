<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>sort() select</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método sort()</h1>

  <div class="row g-4">

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <select id="selNum" class="form-select mt-3">
          <option value="">Ordenar números</option>
          <option value="asc">Menor a mayor</option>
        </select>

        <div id="resNum" class="mt-3"></div>
      </div>
    </div>

    <!-- PALABRAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Palabras</h3>
        <div id="palabras"></div>

        <select id="selPal" class="form-select mt-3">
          <option value="">Ordenar palabras</option>
          <option value="az">A-Z</option>
        </select>

        <div id="resPal" class="mt-3"></div>
      </div>
    </div>

    <!-- PERSONAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Personas</h3>
        <div id="personas"></div>

        <select id="selPer" class="form-select mt-3">
          <option value="">Ordenar personas</option>
          <option value="edad">Por edad</option>
        </select>

        <div id="resPer" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
