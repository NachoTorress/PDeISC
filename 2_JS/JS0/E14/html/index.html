<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>reverse()</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método reverse()</h1>

  <div class="row g-4">

    <!-- LETRAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Letras</h3>
        <div id="letras"></div>

        <button id="btnLet" class="btn btn-primary mt-3">
          Invertir letras
        </button>

        <div id="resLet" class="mt-3"></div>
      </div>
    </div>

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <button id="btnNum" class="btn btn-success mt-3">
          Invertir números
        </button>

        <div id="resNum" class="mt-3"></div>
      </div>
    </div>

    <!-- TEXTO -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Texto</h3>

        <div id="texto" class="mb-2">JavaScript</div>

        <button id="btnTxt" class="btn btn-warning mt-3">
          Invertir texto
        </button>

        <div id="resTxt" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
