<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="/styles/style.css">

  <title>Pop() en JavaScript</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método pop() en JavaScript</h1>

  <div class="row g-4">

    <!-- Animales -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Animales</h3>
        <div id="animales"></div>

        <button id="btnAnimal" class="btn btn-danger mt-3">
          Doble toque para eliminar último animal
        </button>
      </div>
    </div>

    <!-- Lista de compras -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Lista de compras</h3>
        <div id="compras"></div>

        <button id="btnCompra" class="btn btn-warning mt-3">
          Doble toque para eliminar último producto
        </button>
      </div>
    </div>

    <!-- Vaciar números -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <button id="btnNumero" class="btn btn-primary mt-3">
          Doble toque para vaciar array
        </button>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <h4 id="resultado">Elemento eliminado: -</h4>
  </div>

</div>

<script src="/scripts/script.js"></script>
</body>
</html>
