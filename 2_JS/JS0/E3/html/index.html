<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../styles/style.css">

  <title>Unshift() en JavaScript</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método unshift() en JavaScript</h1>

  <div class="row g-4">

    <!-- Colores -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Colores</h3>
        <div id="colores"></div>

        <select id="selectColor" class="form-select mt-3" onchange="agregarColor()">
          <option value="">Seleccionar color</option>
          <option value="Rojo">Rojo</option>
          <option value="Verde">Verde</option>
          <option value="Azul">Azul</option>
        </select>
      </div>
    </div>

    <!-- Tareas -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Tareas</h3>
        <div id="tareas"></div>

        <select id="selectTarea" class="form-select mt-3" onchange="agregarTarea()">
          <option value="">Agregar tarea urgente</option>
          <option value="Tarea urgente para mañana">Tarea urgente para mañana</option>
        </select>
      </div>
    </div>

    <!-- Usuarios -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Usuarios conectados</h3>
        <div id="usuarios"></div>

        <select id="selectUsuario" class="form-select mt-3" onchange="agregarUsuario()">
          <option value="">Agregar usuario</option>
          <option value="Alexis">Alexis</option>
        </select>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <h4 id="resultado">Último agregado: -</h4>
  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
