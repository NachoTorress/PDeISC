<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="../styles/style.css">

  <title>Shift() en JavaScript</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método shift() en JavaScript</h1>

  <div class="row g-4">

    <!-- Enteros -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Enteros</h3>
        <div id="enteros"></div>

        <input
          type="range"
          min="0"
          max="1"
          value="0"
          class="form-range mt-3"
          id="rangoEnteros"
          onchange="eliminarEntero()"
        >

        <p class="text-center" id="textoEnteros">
          Deslizá para eliminar el primero
        </p>
      </div>
    </div>

    <!-- Mensajes -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Mensajes</h3>
        <div id="mensajes"></div>

        <input
          type="range"
          min="0"
          max="1"
          value="0"
          class="form-range mt-3"
          id="rangoMensajes"
          onchange="eliminarMensaje()"
        >

        <p class="text-center" id="textoMensajes">
          Deslizá para eliminar el primero
        </p>
      </div>
    </div>

    <!-- Cola -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Cola de atención</h3>
        <div id="cola"></div>

        <input
          type="range"
          min="0"
          max="1"
          value="0"
          class="form-range mt-3"
          id="rangoCola"
          onchange="atenderCliente()"
        >

        <p class="text-center" id="textoCola">
          Deslizá para atender al primero
        </p>
      </div>
    </div>

  </div>

  <div class="text-center mt-4">
    <h4 id="resultado">Elemento eliminado: -</h4>
  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
