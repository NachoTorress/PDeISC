<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>splice final</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">splice() con eliminación de botones</h1>

  <div class="row g-4">

    <!-- LETRAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Letras</h3>
        <div id="letras"></div>

        <button id="btnLetras" class="btn btn-danger mt-3">
          Eliminar desde 1
        </button>
      </div>
    </div>

    <!-- NOMBRES -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Nombres</h3>
        <div id="nombres"></div>

        <button id="btnNombres" class="btn btn-warning mt-3">
          Insertar Nacho
        </button>
      </div>
    </div>

    <!-- COSAS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Cosas</h3>
        <div id="cosas"></div>

        <input id="pos" class="form-control mt-3" placeholder="Posición">
        <input id="n1" class="form-control mt-2" placeholder="Nuevo 1">
        <input id="n2" class="form-control mt-2" placeholder="Nuevo 2">

        <button id="btnCosas" class="btn btn-primary mt-3">
          Reemplazar dinámico
        </button>
      </div>
    </div>

  </div>

  <h4 class="text-center mt-4" id="resultado">Acción: -</h4>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
