<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>Slice con dblclick</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método slice() con doble click</h1>

  <div class="row g-4">

    <!-- Números -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <button id="btnNumeros" class="btn btn-primary mt-3">
          Doble click: copiar primeros 3
        </button>

        <div id="resNumeros" class="mt-3"></div>
      </div>
    </div>

    <!-- Películas -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Películas</h3>
        <div id="peliculas"></div>

        <button id="btnPeliculas" class="btn btn-warning mt-3">
          Doble click: copiar posición 2 a 4
        </button>

        <div id="resPeliculas" class="mt-3"></div>
      </div>
    </div>

    <!-- Últimos -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Últimos</h3>
        <div id="ultimos"></div>

        <button id="btnUltimos" class="btn btn-success mt-3">
          Doble click: copiar últimos 3
        </button>

        <div id="resUltimos" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
