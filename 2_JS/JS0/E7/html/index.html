<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>indexOf() con input</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">Método indexOf()</h1>

  <div class="row g-4">

    <!-- PERRO -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Animales</h3>
        <div id="animales"></div>

        <input id="inputPerro" class="form-control mt-3" placeholder="Buscar 'perro'">

        <div id="resPerro" class="mt-3"></div>
      </div>
    </div>

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <input id="inputNumero" class="form-control mt-3" placeholder="Buscar 50">

        <div id="resNumero" class="mt-3"></div>
      </div>
    </div>

    <!-- CIUDADES -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Ciudades</h3>
        <div id="ciudades"></div>

        <input id="inputCiudad" class="form-control mt-3" placeholder="Buscar Madrid">

        <div id="resCiudad" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
