<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>includes() limpio</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">includes() - solo verificación</h1>

  <div class="row g-4">

    <!-- ADMIN -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Usuarios</h3>
        <div id="usuarios"></div>

        <button id="btnAdmin" class="btn btn-primary mt-3">
          Verificar admin
        </button>

        <div id="resAdmin" class="mt-3"></div>
      </div>
    </div>

    <!-- COLORES -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Colores</h3>
        <div id="colores"></div>

        <button id="btnColor" class="btn btn-success mt-3">
          Verificar verde
        </button>

        <div id="resColor" class="mt-3"></div>
      </div>
    </div>

    <!-- NUMEROS -->
    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <button id="btnNumero" class="btn btn-warning mt-3">
          Verificar 50
        </button>

        <div id="resNumero" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
