<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../styles/style.css">

  <title>forEach limpio</title>
</head>
<body>

<div class="container py-5">

  <h1 class="text-center mb-4">forEach() con formato limpio</h1>

  <div class="row g-4">

    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Nombres</h3>
        <div id="nombres"></div>

        <button id="btnNombres" class="btn btn-primary mt-3">
          Saludar
        </button>

        <div id="resNombres" class="mt-3"></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Números</h3>
        <div id="numeros"></div>

        <button id="btnNumeros" class="btn btn-success mt-3">
          Doblar
        </button>

        <div id="resNumeros" class="mt-3"></div>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card shadow p-3">
        <h3>Personas</h3>
        <div id="personas"></div>

        <button id="btnPersonas" class="btn btn-warning mt-3">
          Mostrar
        </button>

        <div id="resPersonas" class="mt-3"></div>
      </div>
    </div>

  </div>

</div>

<script src="../scripts/script.js"></script>
</body>
</html>
