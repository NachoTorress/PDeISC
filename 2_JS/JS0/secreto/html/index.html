<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIA - Secreto Decodificador</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white text-center">
                        <h2 class="h4 mb-0">Decodificador SECRETO</h2>
                    </div>
                    <div class="card-body">
                        <p class="text-muted small">Según el problema <b>secreto.pdf</b>, los fragmentos entre paréntesis se leerán al revés.</p>
                        
                        <div class="mb-3">
                            <label for="inputTexto" class="form-label fw-bold">Mensaje Codificado:</label>
                            <textarea id="inputTexto" class="form-control" rows="4" placeholder="Ej: Hoy (.sh 22 sal a) Marcelo."></textarea>
                        </div>

                        <button id="btnDescifrar" class="btn btn-primary w-100 fw-bold">
                            DESCIFRAR MENSAJE
                        </button>

                        <!-- Área de Alertas/Errores -->
                        <div id="errorContainer" class="mt-3 d-none">
                            <div class="alert alert-danger mb-0" role="alert">
                                <strong id="errorMsg"></strong>
                            </div>
                        </div>

                        <hr class="my-4">

                        <div class="mb-2 fw-bold text-secondary">Mensaje Decodificado:</div>
                        <div id="resultado" class="p-3 border rounded bg-white text-dark shadow-sm min-vh-10">
                            <span class="text-muted italic">El resultado aparecerá aquí...</span>
                        </div>
                    </div>
                    <div class="card-footer text-center text-muted small">
                        Certamen Nacional OIA
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../scripts/script.js"></script>
</body>
</html>
